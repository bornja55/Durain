<script>
  // ============================================================================
  // Core Application & Utilities
  // ============================================================================
  const UtilsVM = (function () {
    function getDriveImageUrl(url) {

      if (!url) return '';
      let match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (!match) match = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (match) {
        return 'https://drive.google.com/thumbnail?id=' + match[1] + '&sz=w400';
      }
      return url;

    }

    // Anything that ultimately comes from a LINE display name or free-typed
    // text (registered users, custom variety names, rejection reasons, ...)
    // must go through this before being concatenated into innerHTML.
    // Otherwise a malicious LINE display name becomes stored XSS that runs
    // in this authenticated Dashboard session.
    function escapeHtml(value) {
      if (value === null || value === undefined) return '';
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    return { getDriveImageUrl, escapeHtml };
  })();

  // ============================================================================
  // Auth View Model
  // ============================================================================
  const AuthVM = (function () {
    let currentUser = null;
    let sessionToken = null;

    // Replaces the old PIN-code login. LIFF's liff.init()/getIDToken() was
    // tried first, but GAS always serves /exec pages from inside its own
    // content sandbox iframe (a *-script.googleusercontent.com origin) -
    // LIFF's SDK checks that the page's real URL is under the registered
    // LIFF Endpoint URL, sees a totally different origin, and falls back to
    // a broken same-origin verification path (tries to frame access.line.me,
    // which sends X-Frame-Options: deny, so it just hangs/loops). That's a
    // structural GAS-vs-LIFF incompatibility, not something fixable here.
    //
    // Fix: use plain LINE Login (OAuth2 authorization-code flow) instead of
    // the LIFF SDK. doGet() in Code.gs already did the whole handshake
    // server-side before this page was even rendered (see ?code=&state=
    // handling there) - it either:
    //   - templated a ready SERVER_SESSION_TOKEN (login succeeded), or
    //   - templated a SERVER_LOGIN_ERROR (login failed/was denied), or
    //   - templated neither (fresh visit, not logged in yet) plus a
    //     LINE_LOGIN_URL for the button to navigate to.
    // No SDK, no origin check, no iframe issues - it's just a normal
    // top-level browser redirect to access.line.me and back.
    async function init() {
      try {
        document.getElementById('loginError').classList.add('hidden');

        if (typeof SERVER_LOGIN_ERROR !== 'undefined' && SERVER_LOGIN_ERROR) {
          showLoginError(SERVER_LOGIN_ERROR);
          showLoginButton();
          return;
        }

        if (typeof SERVER_SESSION_TOKEN !== 'undefined' && SERVER_SESSION_TOKEN) {
          sessionToken = SERVER_SESSION_TOKEN;
          document.getElementById('loginStatus').textContent = 'กำลังตรวจสอบสิทธิ์...';
          document.getElementById('loading').classList.remove('hidden');
          AuthVM.verifyAccess(sessionToken);
          return;
        }

        // Not logged in yet - show the button; clicking it does a real,
        // user-initiated top-level navigation to LINE's login page.
        showLoginButton();
      } catch (err) {
        showLoginError('เกิดข้อผิดพลาด: ' + err.message);
      }
    }

    function showLoginError(msg) {
      document.getElementById('login').classList.remove('hidden');
      const el = document.getElementById('loginError');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function showLoginButton() {
      const status = document.getElementById('loginStatus');
      if (status) status.textContent = 'กรุณากดปุ่มด้านล่างเพื่อเข้าสู่ระบบด้วย LINE';
      const btn = document.getElementById('loginTopButton');
      if (btn) btn.classList.remove('hidden');
    }

    function goToLineLogin() {
      if (typeof LINE_LOGIN_URL !== 'undefined' && LINE_LOGIN_URL) {
        window.top.location.href = LINE_LOGIN_URL;
      }
    }

    function verifyAccess(token) {

      document.getElementById('loading').classList.remove('hidden');
      google.script.run
        .withSuccessHandler(AuthVM.onAccessSuccess)
        .withFailureHandler((err) => {
          document.getElementById('loading').classList.add('hidden');
          alert("Error: " + err.message);
        })
        .checkUserAccessWeb(token);

    }

    function onAccessSuccess(res) {
      if (res.hasAccess) {
        currentUser = res.user;
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('login').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('app').classList.add('flex');
        // Setup user info and fetch weather
        document.getElementById('userName').innerText = currentUser.name;
        document.getElementById('userImg').src = currentUser.pictureUrl || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(currentUser.name);
        DashboardVM.fetchWeather();

        // Check if admin
        if (currentUser.role === 'เจ้าของ' || currentUser.role === 'admin') {
          const seasonCard = document.getElementById('seasonManagementCard');
          if (seasonCard) seasonCard.classList.remove('hidden');
        }

        // Initialize initial tabs
        DashboardVM.load();
        MapVM.init();
      } else {
        onAccessError('ไม่มีสิทธิ์เข้าถึง');
        document.getElementById('login').classList.add('hidden');
        document.getElementById('unauthorized').classList.remove('hidden');
      }
    }

    function onAccessError(msg) {
      document.getElementById('loading').classList.add('hidden');
      alert("ข้อผิดพลาด: " + msg);
    }

    window.authGoToLineLogin = goToLineLogin;

    return {
      getCurrentUser: () => currentUser,
      getSessionToken: () => sessionToken,
      init,
      verifyAccess,
      onAccessSuccess,
      onAccessError,
      goToLineLogin
    };
  })();

  document.addEventListener('DOMContentLoaded', () => AuthVM.init());

  // ============================================================================
  // Navigation View Model
  // ============================================================================
  const NavVM = (function () {
    function switchTab(tabId, btn) {

      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

      document.getElementById('tab-' + tabId).classList.remove('hidden');
      if (btn) {
        btn.classList.add('active');
      } else {
        const targetBtn = document.querySelector('button[onclick*="switchTab(\'' + tabId + '\'"]');
        if (targetBtn) targetBtn.classList.add('active');
      }

      if (tabId === 'pending') PendingVM.load();
      if (tabId === 'users') UsersVM.load();
      if (tabId === 'trees') TreesVM.load();
      if (tabId === 'income') IncomeVM.load();
      if (tabId === 'map') {
        MapVM.init();
        setTimeout(() => {
          const map = MapVM.getInstance();
          if (map) {
            map.invalidateSize();
            MapVM.loadMarkers();
          }
        }, 100);
      }

    }

    window.switchTab = switchTab;

    return { switchTab };
  })();

  // ============================================================================
  // Dashboard View Model
  // ============================================================================
  const DashboardVM = (function () {
    let varietyChartInstance = null;
    let salesDonutChartInstance = null;
    let yoyChartInstance = null;

    function load() {
      google.script.run
        .withSuccessHandler(DashboardVM.render)
        .withFailureHandler((err) => alert(err.message))
        .getDashboardDataWeb(AuthVM.getSessionToken());
    }

    function render(data) {

      document.getElementById('valTotalTrees').textContent = data.totalTrees.toLocaleString();
      document.getElementById('valPendingCount').textContent = data.pendingCount.toLocaleString();
      document.getElementById('pendingBadge').textContent = data.pendingCount;

      const user = AuthVM.getCurrentUser();

      if (user && (user.role === 'เจ้าของ' || user.role === 'admin')) {
        const seasonCard = document.getElementById('seasonManagementCard');
        if (seasonCard) {
          seasonCard.classList.remove('hidden');
          document.getElementById('currentSeasonDisplay').textContent = data.activeSeason || '-';
        }
      }

      // Render Chart
      const ctx = document.getElementById('varietyChart').getContext('2d');
      if (varietyChartInstance) varietyChartInstance.destroy();

      const labels = Object.keys(data.variety);
      const values = Object.values(data.variety);

      varietyChartInstance = new Chart(ctx, {
        type: 'pie',
        data: {
          labels: labels,
          datasets: [{
            data: values,
            backgroundColor: ['#7CB342', '#F9A825', '#A1887F', '#4DD0E1', '#FF8A65']
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false
        }
      });

      // Render YoY Chart
      const ctxYoy = document.getElementById('yoyChart').getContext('2d');
      if (yoyChartInstance) yoyChartInstance.destroy();

      if (data.yoy) {
        const yoyLabels = Object.keys(data.yoy).sort();
        const yoyValues = yoyLabels.map(k => data.yoy[k]);

        yoyChartInstance = new Chart(ctxYoy, {
          type: 'bar',
          data: {
            labels: yoyLabels,
            datasets: [{
              label: 'จำนวนผลผลิตที่ตัดขาย (ลูก)',
              data: yoyValues,
              backgroundColor: '#4caf50',
              borderRadius: 4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              y: { beginAtZero: true }
            }
          }
        });
      }

      // Render Total Revenue
      const elTotalRevenue = document.getElementById('valTotalRevenue');
      if (elTotalRevenue) {
        elTotalRevenue.textContent = (data.totalRevenue || 0).toLocaleString();
      }

      // Render Sales Donut Chart
      const ctxDonut = document.getElementById('salesDonutChart');
      if (ctxDonut) {
        if (salesDonutChartInstance) salesDonutChartInstance.destroy();
        
        const salesData = data.salesData || {};
        const donutLabels = Object.keys(salesData);
        const donutValues = Object.values(salesData);
        
        salesDonutChartInstance = new Chart(ctxDonut.getContext('2d'), {
          type: 'doughnut',
          data: {
            labels: donutLabels,
            datasets: [{
              data: donutValues,
              backgroundColor: ['#F59E0B', '#10B981', '#3B82F6', '#EF4444', '#8B5CF6'],
              borderWidth: 0,
              hoverOffset: 4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '70%',
            plugins: {
              legend: {
                position: 'right',
                labels: {
                  usePointStyle: true,
                  padding: 20,
                  font: { family: 'Prompt', size: 12 }
                }
              }
            }
          }
        });
      }

      // Render Recent Activities
      const listEl = document.getElementById('recentActivitiesList');
      if (listEl) {
        if (!data.recentActivities || data.recentActivities.length === 0) {
          listEl.innerHTML = '\x3Cdiv class="text-center py-4 text-gray-500 text-sm"\x3Eไม่มีกิจกรรมล่าสุด\x3C/div\x3E';
        } else {
          let actHtml = '';
          data.recentActivities.forEach(act => {
            const isDamage = act.action === 'เสียหาย';
            const iconStr = isDamage ? 'warning' : 'payments';
            const colorClass = isDamage ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-500';
            const dateStr = act.date ? new Date(act.date).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' }) : '-';
            
            actHtml += '\x3Cdiv class="flex items-center gap-4 bg-gray-50/50 p-3 rounded-xl border border-gray-100"\x3E' +
              '\x3Cdiv class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 ' + colorClass + '"\x3E' +
              '\x3Cspan class="material-symbols-rounded text-[20px]"\x3E' + iconStr + '\x3C/span\x3E' +
              '\x3C/div\x3E' +
              '\x3Cdiv class="flex-1 min-w-0"\x3E' +
              '\x3Cp class="font-bold text-gray-800 text-sm truncate"\x3Eต้นที่ ' + act.treeId + ' (' + act.action + ')\x3C/p\x3E' +
              '\x3Cp class="text-xs text-gray-500 truncate"\x3Eบันทึกโดย: ' + UtilsVM.escapeHtml(act.user || '-') + '\x3C/p\x3E' +
              '\x3C/div\x3E' +
              '\x3Cdiv class="text-right"\x3E' +
              '\x3Cp class="font-black text-gray-900"\x3E' + act.quantity + ' ลูก\x3C/p\x3E' +
              '\x3Cp class="text-[10px] text-gray-400 font-medium"\x3E' + dateStr + '\x3C/p\x3E' +
              '\x3C/div\x3E' +
              '\x3C/div\x3E';
          });
          listEl.innerHTML = actHtml;
        }
      }
    }

    function fetchWeather(trees) {
      let lat = 13.75;
      let lng = 100.51;

      if (trees && trees.length > 0) {
        let sumLat = 0, sumLng = 0, count = 0;
        trees.forEach(t => {
          if (t.lat && t.lng) {
            sumLat += parseFloat(t.lat);
            sumLng += parseFloat(t.lng);
            count++;
          }
        });
        if (count > 0) {
          lat = sumLat / count;
          lng = sumLng / count;
        }
      }

      fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lng + '&current_weather=true')
        .then(res => res.json())
        .then(resData => {
          const w = resData.current_weather;
          document.getElementById('widgetTemp').textContent = Math.round(w.temperature) + '°';
          document.getElementById('widgetDate').textContent = new Date().toLocaleDateString('th-TH', { weekday: 'short', day: 'numeric', month: 'short' });

          const wc = w.weathercode;
          let text = 'อากาศดี';
          if (wc === 0) text = 'ท้องฟ้าโปร่ง';
          else if (wc >= 1 && wc <= 3) text = 'มีเมฆบางส่วน';
          else if (wc >= 45 && wc <= 48) text = 'มีหมอก';
          else if (wc >= 51 && wc <= 67) text = 'ฝนตก';
          else if (wc >= 71 && wc <= 77) text = 'หิมะตก';
          else if (wc >= 80 && wc <= 82) text = 'ฝนตกหนัก';
          else if (wc >= 95) text = 'พายุฝนฟ้าคะนอง';

          document.getElementById('widgetWeatherText').textContent = text;
        })
        .catch(() => {
          document.getElementById('widgetTemp').textContent = '--°';
          document.getElementById('widgetWeatherText').textContent = 'ไม่มีข้อมูล';
        });
    }

    function openSeasonModal() {

      const currentSeason = document.getElementById('currentSeasonDisplay').textContent;
      const newSeason = prompt("กรุณาระบุปีฤดูกาลใหม่ (เช่น 2568, 2569)\n*ระบบจะตั้งเป็นฤดูกาลปัจจุบันและเปิดใช้งานอัตโนมัติ", currentSeason !== '-' ? currentSeason : '');

      if (newSeason && newSeason.trim() !== '' && newSeason.trim() !== currentSeason) {
        document.getElementById('currentSeasonDisplay').textContent = 'กำลังเปลี่ยน...';
        google.script.run
          .withSuccessHandler((res) => {
            if (res.success) {
              alert('เปลี่ยนฤดูกาลสำเร็จ ข้อมูลทั้งหมดจะรีเฟรชเป็นฤดูกาลใหม่');
              location.reload();
            }
          })
          .withFailureHandler(err => {
            alert(err.message);
            DashboardVM.load();
          })
          .changeActiveSeasonWeb(newSeason.trim(), AuthVM.getSessionToken());
      }

    }

    window.openSeasonModal = openSeasonModal;

    return { load, render, fetchWeather, openSeasonModal };
  })();

  // ============================================================================
  // Pending View Model
  // ============================================================================
  const PendingVM = (function () {
    let data = { pending: [], approved: [], rejected: [] };
    let currentTab = 'pending';

    function load() {
      document.getElementById('pendingList').innerHTML = '<div class="text-center py-8 text-gray-500">กำลังโหลด...</div>';
      google.script.run
        .withSuccessHandler((res) => {
          data = res;
          renderList();
        })
        .withFailureHandler((err) => alert(err.message))
        .getPendingItemsWeb(AuthVM.getSessionToken());
    }

    function renderList() {
      const allPendingData = data;
      const currentPendingTab = currentTab;
      const getDriveImageUrl = UtilsVM.getDriveImageUrl;

      const container = document.getElementById('pendingList');
      const items = allPendingData[currentPendingTab] || [];

      document.getElementById('valPendingSummaryCount').textContent = allPendingData.pending.length;
      document.getElementById('valApprovedSummaryCount').textContent = allPendingData.approved.length;

      if (items.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-gray-500">ไม่มีรายการในสถานะนี้</div>';
        return;
      }

      let html = '';
      items.forEach(item => {
        let detailsHtml = '<div class="flex flex-wrap gap-2">';
        for (const [k, v] of Object.entries(item.data || {})) {
          if (k !== 'photoUrl' && v) {
            let label = k === 'variety' ? 'สายพันธุ์' : k === 'age' ? 'อายุ (ปี)' : k === 'quantity' ? 'จำนวน' : k === 'grade' ? 'เกรด' : k === 'price' ? 'ราคา' : k === 'reason' ? 'เหตุผล' : k === 'weight' ? 'น้ำหนัก (กก.)' : k;
            detailsHtml += '\x3Cspan class="bg-gray-50 text-gray-700 text-xs px-2 py-1 rounded border border-gray-100"\x3E\x3Cspan class="font-bold text-gray-500"\x3E' + label + ':\x3C/span\x3E ' + UtilsVM.escapeHtml(v) + '\x3C/span\x3E';
          }
        }
        detailsHtml += '</div>';

        const photoUrl = getDriveImageUrl(item.data.photoUrl);
        const photoHtml = photoUrl ? '\x3Cimg src="' + photoUrl + '" class="w-full h-32 object-cover rounded-xl"\x3E' : '';

        let actionsHtml = '';
        if (currentPendingTab === 'pending') {
          actionsHtml = '\x3Cdiv class="flex gap-2 mt-4 pt-4 border-t border-gray-100"\x3E' +
            '\x3Cbutton data-approve-id="' + item.id + '" class="flex-1 bg-primary hover:bg-[#689f38] text-white py-2 rounded-xl font-bold transition-colors shadow-sm"\x3Eอนุมัติ\x3C/button\x3E' +
            '\x3Cbutton data-reject-id="' + item.id + '" class="flex-1 bg-red-50 hover:bg-red-100 text-red-600 py-2 rounded-xl font-bold transition-colors"\x3Eปฏิเสธ\x3C/button\x3E' +
            '\x3C/div\x3E';
        } else if (currentPendingTab === 'rejected' && item.rejectReason) {
          actionsHtml = '\x3Cp class="mt-3 text-sm text-red-500 bg-red-50 p-2 rounded-lg font-medium"\x3Eเหตุผลที่ปฏิเสธ: ' + UtilsVM.escapeHtml(item.rejectReason) + '\x3C/p\x3E';
        }

        html += '\x3Cdiv id="item-' + item.id + '" class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex flex-col sm:flex-row gap-5"\x3E' +
          '\x3Cdiv class="flex-1"\x3E' +
          '\x3Cdiv class="flex items-center justify-between mb-2"\x3E' +
          '\x3Cdiv class="flex items-center gap-2"\x3E' +
          '\x3Cspan class="px-2 py-1 bg-blue-50 text-blue-700 rounded text-xs font-bold uppercase tracking-wider border border-blue-100"\x3E' + item.type + '\x3C/span\x3E' +
          '\x3Cspan class="font-bold text-gray-800 text-sm bg-gray-100 px-2 py-1 rounded"\x3Eรหัสต้น: ' + item.treeId + '\x3C/span\x3E' +
          '\x3C/div\x3E' +
          '\x3Cspan class="text-xs text-gray-400 font-medium"\x3E' + new Date(item.date).toLocaleString('th-TH') + '\x3C/span\x3E' +
          '\x3C/div\x3E' +
          '\x3Cdiv class="mt-3 space-y-1"\x3E' + detailsHtml +
          '\x3Cp class="text-xs text-gray-400 mt-1 flex items-center gap-1"\x3E\x3Cspan class="material-symbols-rounded text-[14px]"\x3Eperson\x3C/span\x3E บันทึกโดย: ' + UtilsVM.escapeHtml(item.recorderName) + '\x3C/p\x3E' +
          '\x3C/div\x3E' + actionsHtml +
          '\x3C/div\x3E' +
          (photoUrl ? '\x3Cdiv class="w-full sm:w-48 shrink-0 flex items-center justify-center"\x3E' + photoHtml + '\x3C/div\x3E' : '') +
          '\x3C/div\x3E';
      });
      container.innerHTML = html;
    }

    function approve(id) {

      if (!confirm('ยืนยันการอนุมัติ?')) return;
      google.script.run
        .withSuccessHandler(() => {
          document.getElementById('item-' + id).remove();
          DashboardVM.load(); // update counts
        })
        .approvePendingItemWeb(id, AuthVM.getSessionToken());

    }

    function reject(id) {

      const reason = prompt('กรุณาระบุเหตุผลการปฏิเสธ:');
      if (reason === null) return;
      google.script.run
        .withSuccessHandler(() => {
          document.getElementById('item-' + id).remove();
          DashboardVM.load(); // update counts
        })
        .rejectPendingItemWeb(id, reason, AuthVM.getSessionToken());

    }

    function setTab(tab) {
      currentTab = tab;
      // Update button styles
      ['pending', 'approved', 'rejected'].forEach(t => {
        const btn = document.getElementById('pendingTabBtn-' + t);
        if (btn) {
          if (t === tab) {
            btn.className = 'px-6 py-2 rounded-lg font-bold text-sm bg-white text-primary shadow-sm transition-all';
          } else {
            btn.className = 'px-6 py-2 rounded-lg font-bold text-sm text-gray-500 hover:text-gray-700 transition-all';
          }
        }
      });
      renderList();
    }

    window.setPendingTab = setTab;
    window.approveItem = approve;
    window.rejectItem = reject;

    return { load, renderList, approve, reject, setTab };
  })();

  // ============================================================================
  // Trees View Model
  // ============================================================================
  const TreesVM = (function () {
    let data = [];
    let currentEditImages = [];
    let treeDetailMapInstance = null;
    // Bulk QR print selection - a Set of tree IDs, kept separate from
    // `data` so it survives search filtering (display() only re-renders a
    // filtered subset, it never resets selection).
    let selectedIds = new Set();
    // Whatever array was last passed to display() - i.e. the currently
    // visible rows (all trees, or a search-filtered subset). Select-all /
    // select-unprinted act on this, not the full `data`, so they only
    // touch what's actually on screen.
    let currentView = [];

    function load() {
      document.getElementById('treeTableBody').innerHTML = '<tr><td colspan="4" style="text-align:center;">กำลังโหลด...</td></tr>';
      google.script.run
        .withSuccessHandler(TreesVM.render)
        .withFailureHandler((err) => alert(err.message))
        .getAllTreesWeb(AuthVM.getSessionToken());
    }

    function render(trees) {
      data = trees;
      // Drop selected IDs that no longer exist in the fresh data (tree
      // deleted/renamed elsewhere) so the count/print button never refers
      // to stale IDs.
      const liveIds = new Set(trees.map(t => t.id));
      selectedIds.forEach(id => { if (!liveIds.has(id)) selectedIds.delete(id); });
      display(data);
      updateSelectionUI();
    }

    function display(trees) {
      currentView = trees;
      const getDriveImageUrl = UtilsVM.getDriveImageUrl;

      const tbody = document.getElementById('treeTableBody');
      if (trees.length === 0) {
        tbody.innerHTML = '\x3Ctr>\x3Ctd colspan="8" style="text-align:center;">ไม่มีข้อมูลต้นไม้\x3C/td\x3E\x3C/tr\x3E';
        return;
      }
      let html = '';
      trees.forEach(t => {
        const displayUrl = getDriveImageUrl(t.photoUrl);
        let imgHtml = displayUrl ? '\x3Cimg src="' + displayUrl + '" class="w-10 h-10 object-cover rounded-lg mx-auto shadow-sm"\x3E' : '\x3Cdiv class="w-10 h-10 bg-gray-100 rounded-lg flex items-center justify-center text-[10px] text-gray-400 mx-auto"\x3Eไม่มีรูป\x3C/div\x3E';
        const isChecked = selectedIds.has(t.id) ? ' checked' : '';
        const qrCellHtml = t.qrPrinted
          ? '\x3Cspan class="inline-flex items-center gap-1 text-[10px] font-medium text-green-700 bg-green-50 px-2 py-1 rounded-full" title="ปริ้นล่าสุด: ' + UtilsVM.escapeHtml(t.qrPrinted) + '"\x3E\x3Cspan class="material-symbols-rounded text-xs"\x3Echeck_circle\x3C/span\x3Eปริ้นแล้ว\x3C/span\x3E'
          : '\x3Cspan class="inline-flex items-center text-[10px] font-medium text-gray-400 bg-gray-50 px-2 py-1 rounded-full"\x3Eยังไม่ปริ้น\x3C/span\x3E';
        html += '\x3Ctr class="hover:bg-gray-50/50 transition-colors cursor-pointer" onclick="TreesVM.viewTree(\'' + t.id + '\')"\x3E' +
          '\x3Ctd class="p-4 text-center" onclick="event.stopPropagation()"\x3E' +
          '\x3Cinput type="checkbox"' + isChecked + ' onchange="TreesVM.toggleTreeSelect(\'' + t.id + '\', this.checked)"\x3E' +
          '\x3C/td\x3E' +
          '\x3Ctd class="p-4 text-center"\x3E' + imgHtml + '\x3C/td\x3E' +
          '\x3Ctd class="p-4 font-medium"\x3E' + t.id + '\x3C/td\x3E' +
          '\x3Ctd class="p-4"\x3E' + UtilsVM.escapeHtml(t.variety || '-') + '\x3C/td\x3E' +
          '\x3Ctd class="p-4"\x3E' + (t.age || '-') + '\x3C/td\x3E' +
          '\x3Ctd class="p-4 text-right font-medium"\x3E' + (t.fruitCount || '0') + '\x3C/td\x3E' +
          '\x3Ctd class="p-4 text-center"\x3E' + qrCellHtml + '\x3C/td\x3E' +
          '\x3Ctd class="p-4 text-center" onclick="event.stopPropagation()"\x3E' +
          '\x3Cdiv class="flex items-center justify-center gap-2"\x3E' +
          '\x3Cbutton class="bg-primary hover:bg-[#689f38] text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" onclick="TreesVM.editTree(\'' + t.id + '\')"\x3Eแก้ไข\x3C/button\x3E' +
          '\x3Cbutton class="bg-secondary hover:bg-[#f57f17] text-white px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" onclick="TreesVM.printQR(\'' + t.id + '\')"\x3EQR Code\x3C/button\x3E' +
          '\x3C/div\x3E' +
          '\x3C/td\x3E' +
          '\x3C/tr\x3E';
      });
      tbody.innerHTML = html;

    }

    // ---- Bulk QR selection helpers ----

    function toggleTreeSelect(id, checked) {
      if (checked) selectedIds.add(id); else selectedIds.delete(id);
      updateSelectionUI();
    }

    function toggleSelectAll(checked) {
      // Only affects the currently visible rows (all trees, or whatever
      // the search box has filtered down to) - matches what the checkbox
      // in the header visually controls.
      currentView.forEach(t => { if (checked) selectedIds.add(t.id); else selectedIds.delete(t.id); });
      display(currentView);
      updateSelectionUI();
    }

    function selectUnprinted() {
      currentView.forEach(t => { if (!t.qrPrinted) selectedIds.add(t.id); });
      display(currentView);
      updateSelectionUI();
    }

    function clearSelection() {
      selectedIds.clear();
      display(currentView);
      updateSelectionUI();
    }

    function updateSelectionUI() {
      const countEl = document.getElementById('treeSelectedCount');
      if (countEl) countEl.textContent = 'เลือกแล้ว ' + selectedIds.size + ' ต้น';
      const btn = document.getElementById('btnPrintSelectedQR');
      if (btn) btn.disabled = selectedIds.size === 0;
      const selectAllBox = document.getElementById('treeSelectAll');
      if (selectAllBox) {
        const rowBoxes = document.querySelectorAll('#treeTableBody input[type="checkbox"]');
        selectAllBox.checked = rowBoxes.length > 0 && Array.from(rowBoxes).every(cb => cb.checked);
      }
    }

    function filter() {
      const allTreesData = data;

      const q = document.getElementById('treeSearch').value.toLowerCase();
      const filtered = allTreesData.filter(t => t.id.toLowerCase().includes(q) || t.variety.toLowerCase().includes(q));
      TreesVM.display(filtered);

    }

    function viewTree(id) {
      let allTreesData = data;
      if (allTreesData.length === 0 && typeof MapVM !== 'undefined' && MapVM.getAllTreesData) {
        allTreesData = MapVM.getAllTreesData();
      }
      const getDriveImageUrl = UtilsVM.getDriveImageUrl;

      const t = allTreesData.find(x => x.id === id);
      if (!t) return;

      document.getElementById('detailTreeTitle').textContent = t.id;
      document.getElementById('detailTreeVariety').textContent = t.variety || 'ไม่ระบุสายพันธุ์';
      document.getElementById('detailTreeAge').textContent = t.age || '0';
      document.getElementById('detailTreeFruitCount').textContent = t.fruitCount || '0';
      document.getElementById('detailTreeFlowerMonth').textContent = t.flowerMonth || '-';

      const latlngText = (t.lat && t.lng) ? (t.lat + ', ' + t.lng) : '-';
      document.getElementById('detailTreeLatLng').textContent = latlngText;

      const mapContainer = document.getElementById('treeDetailMapContainer');
      if (t.lat && t.lng) {
        if (mapContainer) {
          mapContainer.classList.remove('hidden');
          const lat = parseFloat(t.lat);
          const lng = parseFloat(t.lng);
          if (!isNaN(lat) && !isNaN(lng)) {
            if (!treeDetailMapInstance) {
              treeDetailMapInstance = L.map('treeDetailMap', {
                zoomControl: false,
                dragging: false,
                scrollWheelZoom: false
              });
              L.tileLayer('https://{s}.google.com/vt/lyrs=r&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains: ['mt0', 'mt1', 'mt2', 'mt3']
              }).addTo(treeDetailMapInstance);
            }
            treeDetailMapInstance.setView([lat, lng], 18);
            treeDetailMapInstance.eachLayer(layer => {
              if (layer instanceof L.Marker) treeDetailMapInstance.removeLayer(layer);
            });
            L.marker([lat, lng]).addTo(treeDetailMapInstance);
            
            setTimeout(() => {
              if (treeDetailMapInstance) treeDetailMapInstance.invalidateSize();
            }, 300);
          }
        }
      } else {
        if (mapContainer) mapContainer.classList.add('hidden');
      }

      const gallery = document.getElementById('detailPhotoGallery');
      const prevBtn = document.getElementById('detailPhotoPrev');
      const nextBtn = document.getElementById('detailPhotoNext');
      gallery.innerHTML = '';
      gallery.scrollLeft = 0;

      const urls = t.photoUrl ? t.photoUrl.split(',').filter(u => u.trim() !== '') : [];
      if (urls.length > 0) {
        // Full-size URLs for the lightbox - same list, tapping any thumbnail
        // opens it at index i so prev/next inside the lightbox can page
        // through the rest of this tree's photos too.
        const displayUrls = urls.map(getDriveImageUrl);
        displayUrls.forEach((dUrl, i) => {
          const img = document.createElement('img');
          img.src = dUrl;
          img.className = 'w-4/5 sm:w-64 h-full object-cover shrink-0 snap-center rounded-xl shadow-sm border border-gray-100 cursor-pointer';
          img.onclick = () => openPhotoLightbox(displayUrls, i);
          gallery.appendChild(img);
        });
      } else {
        gallery.innerHTML = '<div class="shrink-0 w-full h-full bg-gray-200 flex items-center justify-center rounded-xl text-gray-500 shadow-sm border border-gray-100">ไม่มีรูปภาพ</div>';
      }

      // Arrow buttons only make sense with more than one photo to page
      // through - hide them entirely otherwise instead of showing
      // useless disabled-looking buttons.
      const showArrows = urls.length > 1;
      [prevBtn, nextBtn].forEach(btn => {
        if (!btn) return;
        btn.classList.toggle('hidden', !showArrows);
        btn.style.display = showArrows ? 'flex' : 'none';
      });

      // Fetch history
      const historyContainer = document.getElementById('detailHistoryContainer');
      historyContainer.innerHTML = '\x3Cdiv class="text-center py-4 bg-white rounded-xl shadow-sm border border-gray-100"\x3E' +
        '\x3Cspan class="material-symbols-rounded animate-spin text-gray-400"\x3Erefresh\x3C/span\x3E' +
        '\x3Cp class="text-xs text-gray-500 mt-2"\x3Eกำลังโหลดประวัติ...\x3C/p\x3E' +
        '\x3C/div\x3E';
      google.script.run
        .withSuccessHandler((history) => {
          if (!history || history.length === 0) {
            historyContainer.innerHTML = '<div class="text-center py-4 text-gray-500 text-sm bg-white rounded-xl shadow-sm border border-gray-100">ยังไม่มีประวัติในฤดูกาลนี้</div>';
            return;
          }
          let html = '';
          history.forEach(h => {
            const isSell = h.quantity > 0 && h.grade !== '-';
            const icon = isSell ? '<span class="material-symbols-rounded text-green-500 bg-green-50 p-2 rounded-lg">shopping_bag</span>' : '<span class="material-symbols-rounded text-amber-500 bg-amber-50 p-2 rounded-lg">warning</span>';
            const title = isSell ? 'ตัดจำหน่าย' : 'แจ้งความเสียหาย';
            const details = isSell ? ('เกรด: ' + h.grade) : ('เหตุผล: ' + h.reason);
            const dt = new Date(h.date).toLocaleDateString('th-TH');

            html += '\x3Cdiv class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex items-center gap-3"\x3E' +
                 icon +
                 '\x3Cdiv class="flex-1"\x3E' +
                   '\x3Cp class="font-bold text-gray-800 text-sm"\x3E' + title + '\x3C/p\x3E' +
                   '\x3Cp class="text-xs text-gray-500"\x3E' + details + '\x3C/p\x3E' +
                 '\x3C/div\x3E' +
                 '\x3Cdiv class="text-right"\x3E' +
                   '\x3Cp class="font-black text-gray-900 text-lg"\x3E' + h.quantity + '\x3C/p\x3E' +
                   '\x3Cp class="text-[10px] text-gray-400 font-medium"\x3E' + dt + '\x3C/p\x3E' +
                 '\x3C/div\x3E' +
               '\x3C/div\x3E';
          });
          historyContainer.innerHTML = html;
        })
        .withFailureHandler(err => {
          historyContainer.innerHTML = '<div class="text-center py-4 text-red-500 text-sm bg-white rounded-xl shadow-sm border border-gray-100">โหลดประวัติล้มเหลว</div>';
        })
        .getTreeHistoryWeb(t.id, AuthVM.getSessionToken());

      document.getElementById('btnDetailEdit').onclick = () => {
        closeTreeDetailModal();
        editTree(t.id);
      };

      document.getElementById('btnDetailQR').onclick = () => {
        closeTreeDetailModal();
        printQR(t.id);
      };

      openTreeDetailModal();

    }

    // Steps the photo gallery one "page" (roughly one photo's width) left
    // (-1) or right (+1). Snap-scroll (snap-x on the container, snap-center
    // on each image) takes care of settling on the nearest photo, so this
    // doesn't need to track an exact index.
    function scrollTreePhotos(direction) {
      const gallery = document.getElementById('detailPhotoGallery');
      if (!gallery) return;
      const firstImg = gallery.querySelector('img');
      const step = (firstImg ? firstImg.getBoundingClientRect().width : gallery.clientWidth) + 12; // +gap-3
      gallery.scrollBy({ left: step * direction, behavior: 'smooth' });
    }

    function editTree(treeId) {
      const id = treeId || document.getElementById('editTreeId').value;
      let allTreesData = data;
      if (allTreesData.length === 0 && typeof MapVM !== 'undefined' && MapVM.getAllTreesData) {
        allTreesData = MapVM.getAllTreesData();
      }
      const getDriveImageUrl = UtilsVM.getDriveImageUrl;

      const t = allTreesData.find(x => x.id === id);
      if (!t) return;
      document.getElementById('editTreeId').value = t.id;
      document.getElementById('modalTreeTitle').textContent = 'แก้ไขต้นไม้ ' + t.id;

      // Try to set variety dropdown. If not in list, might need to handle 'อื่นๆ', but for now just set value
      const varietySelect = document.getElementById('editVariety');
      const validVarieties = ['หมอนทอง', 'ชะนี', 'ก้านยาว', 'กระดุม', 'พวงมณี', 'นกหยิบ', 'อื่นๆ'];
      if (t.variety && validVarieties.includes(t.variety)) {
        varietySelect.value = t.variety;
      } else if (t.variety) {
        varietySelect.value = 'อื่นๆ'; // We could add a custom text field later if 'อื่นๆ' is selected
      } else {
        varietySelect.value = 'หมอนทอง';
      }

      document.getElementById('editAge').value = t.age || '';
      document.getElementById('editFruitCount').value = t.fruitCount || 0;
      document.getElementById('editFlowerMonth').value = t.flowerMonth || '';
      document.getElementById('editPhotoUrl').value = t.photoUrl || '';
      document.getElementById('editPhotoFile').value = '';

      TreesVM.renderPhotoGallery();

      document.getElementById('editLat').value = t.lat || '';
      document.getElementById('editLng').value = t.lng || '';
      openTreeModal();

    }

    function renderPhotoGallery() {
      const getDriveImageUrl = UtilsVM.getDriveImageUrl;
      const setHeroImage = TreesVM.setHeroImage;

      const container = document.getElementById('editPhotoGallery');
      const rawUrl = document.getElementById('editPhotoUrl').value || '';
      container.innerHTML = '';

      if (!rawUrl) return;

      const urls = rawUrl.split(',').filter(u => u.trim() !== '');
      urls.forEach((url, index) => {
        const displayUrl = getDriveImageUrl(url);
        const wrapper = document.createElement('div');
        wrapper.className = 'relative shrink-0 w-32 h-32 rounded-2xl overflow-hidden shadow-sm group';

        const img = document.createElement('img');
        img.src = displayUrl;
        img.className = 'w-full h-full object-cover';

        wrapper.appendChild(img);

        if (index === 0) {
          wrapper.classList.add('ring-4', 'ring-primary');
          const badge = document.createElement('div');
          badge.className = 'absolute top-2 left-2 bg-primary text-white text-xs font-bold px-2 py-1 rounded-lg shadow';
          badge.textContent = 'Hero';
          wrapper.appendChild(badge);
        } else {
          const btn = document.createElement('button');
          btn.className = 'absolute inset-0 bg-black/50 text-white opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center font-bold text-sm backdrop-blur-sm';
          btn.textContent = 'ตั้งเป็นภาพหลัก';

          const user = AuthVM.getCurrentUser();
          if (user && (user.role === 'admin' || user.role === 'เจ้าของ')) {
            btn.onclick = () => setHeroImage(index);
            btn.classList.add('hover:bg-primary', 'hover:text-white', 'text-gray-400');
          }
          wrapper.appendChild(btn);
        }

        const user = AuthVM.getCurrentUser();
        if (user && (user.role === 'admin' || user.role === 'เจ้าของ')) {
          const delBtn = document.createElement('button');
          delBtn.className = 'absolute top-2 right-2 bg-red-500/80 hover:bg-red-600 text-white w-7 h-7 rounded-full flex items-center justify-center shadow transition-colors z-10';
          delBtn.innerHTML = '<span class="material-symbols-rounded text-sm">delete</span>';
          delBtn.onclick = (e) => {
            e.stopPropagation();
            deletePhoto(index);
          };
          wrapper.appendChild(delBtn);
        }

        container.appendChild(wrapper);
      });

    }

    function setHeroImage(index) {
      const currentEditTreeImages = currentEditImages;

      const rawUrl = document.getElementById('editPhotoUrl').value || '';
      const urls = rawUrl.split(',').filter(u => u.trim() !== '');
      if (index > 0 && index < urls.length) {
        const selected = urls.splice(index, 1)[0];
        urls.unshift(selected);
        document.getElementById('editPhotoUrl').value = urls.join(',');
        TreesVM.renderPhotoGallery();
      }

    }

    function handlePhotoUpload(input) {
      const currentEditTreeImages = currentEditImages;

      if (input.files && input.files[0]) {
        const file = input.files[0];

        // Show a loading indicator in the gallery
        const container = document.getElementById('editPhotoGallery');
        const loadingWrapper = document.createElement('div');
        loadingWrapper.className = 'shrink-0 w-32 h-32 rounded-2xl bg-gray-100 flex items-center justify-center shadow-sm';
        loadingWrapper.innerHTML = '<span class="material-symbols-rounded animate-spin text-gray-400 text-3xl">refresh</span>';
        container.appendChild(loadingWrapper);

        const reader = new FileReader();
        reader.onload = function (e) {
          const base64 = e.target.result;
          google.script.run
            .withSuccessHandler(function (url) {
              if (url) {
                const currentVal = document.getElementById('editPhotoUrl').value;
                const newVal = currentVal ? currentVal + ',' + url : url;
                document.getElementById('editPhotoUrl').value = newVal;
                TreesVM.renderPhotoGallery();
              } else {
                loadingWrapper.remove();
                alert('อัปโหลดรูปล้มเหลว');
              }
            })
            .uploadBase64PhotoToDrive(base64, file.name);
        };
        reader.readAsDataURL(file);
      }

    }

    function saveTree() {
      const currentEditTreeImages = currentEditImages;

      const data = {
        id: document.getElementById('editTreeId').value,
        variety: document.getElementById('editVariety').value,
        age: document.getElementById('editAge').value,
        fruitCount: document.getElementById('editFruitCount').value,
        flowerMonth: document.getElementById('editFlowerMonth').value,
        photoUrl: document.getElementById('editPhotoUrl').value,
        lat: document.getElementById('editLat').value,
        lng: document.getElementById('editLng').value
      };

      closeTreeModal();
      document.getElementById('treeTableBody').innerHTML = '\x3Ctr>\x3Ctd colspan="6" class="p-4 text-center text-primary"\x3Eกำลังบันทึก...\x3C/td\x3E\x3C/tr\x3E';

      google.script.run
        .withSuccessHandler((res) => {
          if (res.success) TreesVM.load();
          else alert('Error: ' + res.error);
        })
        .withFailureHandler((err) => alert(err.message))
        .updateTreeWeb(data, AuthVM.getSessionToken());

    }

    function printQR(treeId) {
      if (!treeId) {
        treeId = document.getElementById('editTreeId').value;
      }
      if (!treeId) return;

      // Open the tab immediately (synchronously, in direct response to the
      // click) so popup blockers don't kill it - then fill it in once the
      // server call resolves. Opening it inside the .withSuccessHandler
      // callback instead would make it an async-triggered window.open(),
      // which most browsers block.
      const win = window.open('', '_blank');
      if (win) {
        win.document.write('<p style="font-family:sans-serif;padding:24px;">กำลังโหลดข้อมูล...</p>');
      }

      google.script.run
        .withSuccessHandler((info) => {
          renderQrPrintPage(win, info);
        })
        .withFailureHandler((err) => {
          if (win) {
            win.document.body.innerHTML = '<p style="font-family:sans-serif;padding:24px;color:#c00;">โหลดข้อมูลไม่สำเร็จ: ' + UtilsVM.escapeHtml(err.message) + '</p>';
          }
        })
        .getTreePrintInfoWeb(treeId, AuthVM.getSessionToken());
    }

    // Builds the printable tag: tree ID/age above a large 1200x1200 QR code
    // (sized up from the old 300x300 so it stays sharp when printed and hung
    // on the actual tree), with remaining-fruit/last-record details below
    // the QR. Sized to actually fill an A4 page instead of leaving most of
    // it blank - see QR_TAG_CSS/buildQrTagHtml below, shared with the bulk
    // print flow so both look identical.
    function renderQrPrintPage(win, info) {
      if (!win) return;
      const qrUrl = buildQrImageUrl(info.id);

      win.document.open();
      win.document.write(
        '<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">' +
        '<title>QR ต้นทุเรียน ' + UtilsVM.escapeHtml(info.id) + '</title>' +
        '<style>' + QR_TAG_CSS + '</style></head><body>' +
        buildQrTagHtml(info, qrUrl) +
        '<button class="print-btn" onclick="window.print()">พิมพ์</button>' +
        '</body></html>'
      );
      win.document.close();
    }

    // Shared QR image URL + tag markup/styling for both the single-tree
    // print (renderQrPrintPage) and the bulk print (renderQrPrintPageBulk) -
    // kept as one source so tweaking the layout only has to happen once.
    function buildQrImageUrl(treeId) {
      const qrData = encodeURIComponent('https://liff.line.me/' + LIFF_ID + '?tree=' + treeId);
      return 'https://quickchart.io/qr?text=' + qrData + '&size=1200';
    }

    const QR_TAG_CSS =
      'body{font-family:"Sarabun","Noto Sans Thai",sans-serif;text-align:center;padding:24px;}' +
      '.tag{max-width:700px;margin:0 auto;padding-bottom:32px;}' +
      '.row-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;}' +
      '.row-top b{font-size:44px;font-weight:800;}' +
      '.row-top span{font-size:26px;color:#333;}' +
      'img{width:100%;max-width:600px;height:auto;display:block;margin:0 auto;}' +
      '.row-bottom{display:flex;justify-content:space-between;font-size:26px;margin-top:20px;color:#222;}' +
      '.print-btn{margin:0 auto 24px;padding:12px 32px;font-size:18px;cursor:pointer;display:block;}' +
      '@media print{.print-btn{display:none;}}';

    function buildQrTagHtml(info, qrUrl) {
      const esc = UtilsVM.escapeHtml;
      return '<div class="tag">' +
        '<div class="row-top"><b>' + esc(info.id) + '</b><span>' + esc(info.variety || '-') + ' | อายุ ' + esc(info.age) + ' ปี</span></div>' +
        '<img src="' + qrUrl + '" alt="QR ' + esc(info.id) + '">' +
        '<div class="row-bottom"><span>ผลคงเหลือ ' + esc(info.fruitCount) + ' ลูก</span><span>บันทึกล่าสุด ' + esc(info.lastRecordDate) + '</span></div>' +
        '</div>';
    }

    // ---- Bulk QR print ----
    // Fetches info for every selected tree in one round trip
    // (getTreesPrintInfoBulkWeb), renders one print window with a tag per
    // tree (page-break between each so they print as separate pages/tags),
    // then stamps column H ("QR") in ต้นไม้ via markTreesPrintedWeb so the
    // "ปริ้นแล้ว" status shows up next time the list loads.
    function printSelectedQR() {
      const ids = Array.from(selectedIds);
      if (ids.length === 0) return;

      // Same synchronous-open trick as the single-tree flow above: open
      // the tab immediately, in direct response to the click, so popup
      // blockers don't kill it - fill it in once the server call resolves.
      const win = window.open('', '_blank');
      if (win) {
        win.document.write('<p style="font-family:sans-serif;padding:24px;">กำลังโหลดข้อมูล ' + ids.length + ' ต้น...</p>');
      }

      google.script.run
        .withSuccessHandler((infos) => {
          renderQrPrintPageBulk(win, infos);

          // Only stamp "printed" after the tag page actually rendered -
          // if the info fetch above failed, nothing gets marked.
          google.script.run
            .withFailureHandler((err) => console.error('markTreesPrintedWeb failed:', err.message))
            .withSuccessHandler(() => {
              selectedIds.clear();
              load(); // refresh so the QR column shows the new "ปริ้นแล้ว" status
            })
            .markTreesPrintedWeb(ids, AuthVM.getSessionToken());
        })
        .withFailureHandler((err) => {
          if (win) {
            win.document.body.innerHTML = '<p style="font-family:sans-serif;padding:24px;color:#c00;">โหลดข้อมูลไม่สำเร็จ: ' + UtilsVM.escapeHtml(err.message) + '</p>';
          }
        })
        .getTreesPrintInfoBulkWeb(ids, AuthVM.getSessionToken());
    }

    // Same tag layout/CSS as renderQrPrintPage (single tree, see QR_TAG_CSS/
    // buildQrTagHtml above), repeated once per tree with page-break-after so
    // each comes out as its own printed page.
    function renderQrPrintPageBulk(win, infos) {
      if (!win) return;

      const tagsHtml = infos.map((info) => buildQrTagHtml(info, buildQrImageUrl(info.id))).join('');

      win.document.open();
      win.document.write(
        '<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">' +
        '<title>QR ต้นทุเรียน (' + infos.length + ' ต้น)</title>' +
        '<style>' + QR_TAG_CSS +
        '.tag{page-break-after:always;} .tag:last-child{page-break-after:auto;}' +
        '</style></head><body>' +
        '<button class="print-btn" onclick="window.print()">พิมพ์ทั้งหมด (' + infos.length + ' ต้น)</button>' +
        tagsHtml +
        '</body></html>'
      );
      win.document.close();
    }

    window.filterTrees = filter;
    window.viewTree = viewTree;
    window.handlePhotoUpload = handlePhotoUpload;
    window.saveTree = saveTree;
    // Inline onclick="" attributes run in the page's global scope, which
    // can't reliably resolve `DashboardVM` (a const-scoped IIFE result) by
    // name - same reason saveTree is exported above. Export this the same
    // way instead of referencing DashboardVM.scrollTreePhotos directly.
    window.scrollTreePhotos = scrollTreePhotos;

    // Global listener handles clicks now

    return {
      load, render, display, viewTree, editTree, renderPhotoGallery, setHeroImage, handlePhotoUpload, saveTree, printQR, scrollTreePhotos,
      toggleTreeSelect, toggleSelectAll, selectUnprinted, clearSelection, printSelectedQR
    };
  })();

  // ============================================================================
  // Map View Model
  // ============================================================================
  const MapVM = (function () {
    let mapInstance = null;
    let markersLayer = null;
    let allTreesData = [];

    function init() {
      if (mapInstance) return;
      mapInstance = L.map('map').setView([13.7563, 100.5018], 6); // Default view (Thailand)
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(mapInstance);
      markersLayer = L.layerGroup().addTo(mapInstance);
    }

    function loadMarkers() {
      if (allTreesData.length === 0) {
        google.script.run
          .withSuccessHandler((trees) => {
            allTreesData = trees;
            MapVM.plotTrees();
            if (typeof DashboardVM !== 'undefined' && DashboardVM.fetchWeather) {
              DashboardVM.fetchWeather(trees);
            }
          })
          .getAllTreesWeb(AuthVM.getSessionToken());
      } else {
        MapVM.plotTrees();
      }
    }

    function plotTrees() {
      if (!mapInstance) init();
      markersLayer.clearLayers();

      const bounds = [];
      allTreesData.forEach(t => {
        if (t.lat && t.lng) {
          const lat = parseFloat(t.lat);
          const lng = parseFloat(t.lng);
          if (!isNaN(lat) && !isNaN(lng)) {
            const marker = L.marker([lat, lng]);
            marker.bindPopup('\x3Cb\x3Eรหัส: ' + UtilsVM.escapeHtml(t.id) + '\x3C/b\x3E\x3Cbr\x3Eสายพันธุ์: ' + UtilsVM.escapeHtml(t.variety) + '\x3Cbr\x3Eอายุ: ' + UtilsVM.escapeHtml(t.age) + ' ปี\x3Cbr\x3E' +
              '\x3Cdiv class="mt-2 flex gap-3"\x3E' +
              '\x3Cbutton type="button" class="text-primary font-bold underline" onclick="TreesVM.viewTree(\'' + t.id + '\')"\x3Eดูรายละเอียด\x3C/button\x3E' +
              '\x3Cbutton type="button" class="text-amber-600 font-bold underline" onclick="TreesVM.editTree(\'' + t.id + '\')"\x3Eแก้ไข\x3C/button\x3E' +
              '\x3C/div\x3E');
            markersLayer.addLayer(marker);
            bounds.push([lat, lng]);
          }
        }
      });

      if (bounds.length > 0) {
        mapInstance.fitBounds(bounds);
      }

    }

    return {
      init,
      loadMarkers,
      plotTrees,
      getInstance: () => mapInstance,
      getAllTreesData: () => allTreesData
    };
  })();

  // ============================================================================
  // (Login now happens via AuthVM.init() on DOMContentLoaded, further up.
  // The old ?pin=... URL shortcut has been removed along with PIN auth -
  // it would have leaked the login credential into browser history/logs.)

  // -----------------------------------------------------
  // Event Delegation
  // -----------------------------------------------------
  document.addEventListener('click', function (e) {
    const approveBtn = e.target.closest('[data-approve-id]');
    if (approveBtn) PendingVM.approve(approveBtn.getAttribute('data-approve-id'));

    const rejectBtn = e.target.closest('[data-reject-id]');
    if (rejectBtn) PendingVM.reject(rejectBtn.getAttribute('data-reject-id'));

    const editBtn = e.target.closest('[data-edit-id]');
    if (editBtn) TreesVM.editTree(editBtn.getAttribute('data-edit-id'));
    
    const viewBtn = e.target.closest('[data-view-id]');
    if (viewBtn) TreesVM.viewTree(viewBtn.getAttribute('data-view-id'));

    const printBtn = e.target.closest('[data-print-id]');
    if (printBtn) TreesVM.printQR(printBtn.getAttribute('data-print-id'));
  });
  document.addEventListener('change', function (e) {
    if (e.target && e.target.hasAttribute('data-role-id')) {
      UsersVM.changeRole(e.target.getAttribute('data-role-id'), e.target.value);
    }
  });
