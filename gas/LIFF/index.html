<!DOCTYPE html>
<html lang="th">

<head>

    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    <script id="tailwind-config">

            darkMode: "class",

                extend: {

                        "on-primary": "#FFFFFF",

                        tertiary: "#A1887F",
                        surface: "#FFFFFF",
                        "on-surface": "#1C1B1F",
                        "on-surface-variant": "#49454F",
                        "surface-container": "#F5F5F5",
                        "surface-variant": "#E7E0EC"

                        "xl": "1.5rem",
                        "full": "9999px"

                        headline: ["Quicksand", "Noto Sans Thai", "sans-serif"],
                        display: ["Quicksand", "Noto Sans Thai", "sans-serif"],

    <style>
        body {
            font-family: 'Public Sans', 'Noto Sans Thai', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            min-height: max(884px, 100dvh);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .scanner-overlay {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
        }

        .viewfinder-corner {
            width: 40px;
            height: 40px;
            border-color: #7CB342;
            position: absolute;
        }

        @keyframes scan-line {
            0% {
                top: 0%;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }

        .scan-anim-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #7CB342, transparent);
            position: absolute;
            width: 100%;
            box-shadow: 0 0 8px #7CB342;
            animation: scan-line 3s linear infinite;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="bg-black h-screen w-full flex flex-col">

        </div>
    </div>
    <!-- Top App Bar -->
    <header
        class="fixed top-0 left-0 w-full z-50 bg-white shadow-sm rounded-b-xl flex justify-between items-center px-4 h-16">
        <div class="flex items-center gap-3">
            <button
                class="p-2 hover:bg-surface-variant/50 transition-colors duration-200 rounded-full flex items-center justify-center text-on-surface-variant">
                <span class="material-symbols-outlined" data-icon="help">help</span>
            </button>
        </div>
        <h1 class="font-headline font-bold text-primary text-headline-sm">บ้านสวนโพรงกระต่าย</h1>

                class="p-2 hover:bg-surface-variant/50 transition-colors duration-200 rounded-full flex items-center justify-center text-on-surface-variant">

            </button>

    <!-- Main Scanner UI Content -->
    <main class="relative flex-1 flex flex-col items-center justify-center z-10 mt-16 mb-20">
        <!-- Viewfinder Overlay Structure -->
        <div class="w-full h-full flex flex-col items-center justify-center relative">

            <div class="absolute bottom-0 left-0 right-0 h-[30%] scanner-overlay"></div>
            <div class="absolute top-[20%] left-0 w-[10%] h-[50%] scanner-overlay"></div>
            <div class="absolute top-[20%] right-0 w-[10%] h-[50%] scanner-overlay"></div>
            <!-- Viewfinder Frame -->
            <div class="relative w-[80vw] max-w-[320px] aspect-square flex items-center justify-center">
                <div class="viewfinder-corner top-0 left-0 border-t-4 border-l-4 rounded-tl-xl"></div>
                <div class="viewfinder-corner top-0 right-0 border-t-4 border-r-4 rounded-tr-xl"></div>

                <!-- SCAN BUTTON (Appears when LIFF is ready) -->
                <button id="scanBtn" onclick="scanQR()" style="display:none;"

            <div class="mt-8 px-6 py-3 rounded-full glass-panel flex flex-col items-center gap-2 text-center">

                    <p class="text-white text-sm font-medium tracking-wide" id="status-text">
                        กำลังเชื่อมต่อระบบ...
                    </p>
                </div>
                <p class="text-red-300 text-xs font-bold" id="errorMsg" style="display:none;"></p>
            </div>
        </div>
    </main>
    <!-- Bottom Navigation Bar -->
    <nav

        <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant/30 active:scale-95 transition-all duration-200"
            href="#">
            <span class="material-symbols-outlined" data-icon="home">home</span>
            <span class="font-label text-[10px]">หน้าหลัก</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant/30 active:scale-95 transition-all duration-200"
            href="#">
            <span class="material-symbols-outlined" data-icon="park">park</span>

        <!-- Active Tab: สแกน (Scan) -->
        <a class="flex flex-col items-center justify-center text-primary font-bold bg-primary/10 rounded-xl px-3 py-1 active:scale-95 transition-all duration-200"
            href="#">
            <span class="material-symbols-outlined" data-icon="qr_code_scanner"
                style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>

        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant/30 active:scale-95 transition-all duration-200"
            href="#">

            <span class="font-label text-[10px]">สรุปผล</span>
        </a>
    </nav>

    <!-- Polyfill for localStorage/sessionStorage to fix iOS Safari Iframe Hang -->
    <script>
        // Android WebView Cache Buster for LIFF
        var originalFetch = window.fetch;
        window.fetch = function (url, options) {
            if (typeof url === 'string' && url.indexOf('line-scdn.net') !== -1) {
                url += (url.indexOf('?') !== -1 ? '&' : '?') + '_cacheBuster=' + Math.random();
            }
            return originalFetch(url, options);
        };

        try {
            var x = '__storage_test__';
            window.localStorage.setItem(x, x);
            window.localStorage.removeItem(x);
        } catch (e) {
            console.warn('localStorage is blocked, using polyfill');
            var memoryStorage = function () {
                var data = {};
                return {
                    setItem: function (id, val) { data[id] = String(val); },
                    getItem: function (id) { return data.hasOwnProperty(id) ? data[id] : null; },
                    removeItem: function (id) { delete data[id]; },
                    clear: function () { data = {}; }
                };
            };
            Object.defineProperty(window, 'localStorage', { value: memoryStorage(), writable: true });
            Object.defineProperty(window, 'sessionStorage', { value: memoryStorage(), writable: true });
        }
    </script>

    <!-- LIFF SDK & Logic -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        // Global Error Handler for better debugging
        window.onerror = function (message, source, lineno, colno, error) {
            showError("Error: " + message + " (Line " + lineno + ")");
            return true;
        };
        window.addEventListener("unhandledrejection", function (event) {
            showError("Promise Error: " + (event.reason ? event.reason.message : "unknown"));
        });

        const LIFF_ID = <?= JSON.stringify(liffId) ?>;
        let currentFlow = 'unknown';

        function setStatus(text, icon = 'sync') {
            document.getElementById('status-text').textContent = text;
            document.getElementById('status-icon').textContent = icon;
        }

        function showError(message) {
            setStatus("เกิดข้อผิดพลาด", "error");
            document.getElementById('status-text').classList.add("text-red-400");
            const err = document.getElementById('errorMsg');
            err.textContent = message;
            err.style.display = 'block';
        }

        document.addEventListener("DOMContentLoaded", function () {
            setStatus("DOM Ready...");
            const urlParams = new URLSearchParams(window.location.search);
            currentFlow = urlParams.get('flow') || 'unknown';
            initializeLiff();
        });

        async function initializeLiff() {
            try {
                setStatus("Checking LIFF ID...");
                if (!LIFF_ID || LIFF_ID === "" || LIFF_ID === "null") {
                    throw new Error("ยังไม่ได้ใส่ LIFF_ID ใน Google Sheets (ค่าปัจจุบัน: " + LIFF_ID + ")");
                }

                setStatus("liff.init...");
                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    setStatus("Logging in...");
                    liff.login();
                    return;
                }

                if (!liff.isInClient()) {
                    showError("กรุณาเปิดลิงก์นี้ผ่านแอปพลิเคชัน LINE เท่านั้น");
                    return;
                }

                // Ready to scan
                setStatus("พร้อมใช้งาน", "check_circle");
                document.getElementById('status-text').classList.remove("text-red-400");
                document.getElementById('status-text').classList.add("text-green-400");
                document.getElementById('scanBtn').style.display = 'flex';

                // Auto-trigger scan for convenience if we want, but let user click is safer
            } catch (err) {
                console.error('LIFF Initialization failed ', err);
                showError(err.message);
            }
        }

        async function scanQR() {
            const scanBtn = document.getElementById('scanBtn');
            scanBtn.disabled = true;
            scanBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> กำลังโหลดกล้อง...';

            try {
                if (liff.scanCodeV2) {
                    const result = await liff.scanCodeV2();
                    if (result && result.value) {
                        processQRData(result.value);
                    } else {
                        resetBtn();
                    }
                } else {
                    showError("LINE ของคุณไม่รองรับการสแกน QR Code ผ่าน LIFF (กรุณาอัปเดต LINE)");
                    resetBtn();
                }
            } catch (err) {
                console.error("Scan error", err);
                showError("ไม่สามารถเปิดกล้องได้: " + err.message);
                resetBtn();
            }
        }

        function resetBtn() {
            const scanBtn = document.getElementById('scanBtn');
            scanBtn.disabled = false;
            scanBtn.innerHTML = '<span class="material-symbols-outlined">qr_code_scanner</span> สแกนใหม่อีกครั้ง';
        }

        async function processQRData(qrUrl) {
            try {
                setStatus("กำลังประมวลผลข้อมูล...", "hourglass_empty");

                const parsedUrl = new URL(qrUrl);
                const treeId = parsedUrl.searchParams.get('tree');

                if (!treeId) {
                    throw new Error("ไม่พบข้อมูลรหัสต้นไม้ (tree) ใน QR Code");
                }

                const messageText = `SCAN:${currentFlow}:${treeId}`;
                await liff.sendMessages([{ type: 'text', text: messageText }]);

                setStatus("ส่งข้อมูลสำเร็จ! กำลังปิดหน้าจอ...", "check_circle");

                setTimeout(() => {
                    liff.closeWindow();
                }, 1000);

            } catch (err) {
                console.error("Processing error", err);
                showError(err.message);
                resetBtn();
            }
        }
    </script>
</body>

</html>
